<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
    <style>
        .fields{
            color: #fffafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        form{
            margin-top: 70%;
        }
        .actions li{
            display: inline-block;
            margin-top: 20px;
            margin-left: 10px;
            
            
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .actions input{
            padding: 10px 10px;
            border-radius: 10px;
        }
        .actions input:hover{
            background-color: #00fa9a;

        }
        .fieldHalf input{
            padding: 10px 10px;
        }
        .field textarea{
            padding: 20px 5px;
        }

    </style>
</head>
<body>
    <header>
        <p></p>
            <li><a href="index.html">Home</a></li>
            <li><a href="habilidades.html">skills</a></li>
            <li><a href="projetos.html">projects</a></li>
            <li><a href="contato.html">contact</a></li>

    </header>
    <section>
        <div class="a1">
          
        </div>
        <div class="a2">
            <form method="post" action="https://api.staticforms.xyz/submit">
                <input type="hidden" name="accessKey" value="1640bb20-6031-4178-8e64-143ab05c2297">
                <input type="hidden" name="redirectTo" value="http://127.0.0.1:5500/contato.html">
                <div class="fields">
                    <div class="fieldHalf">
                        
                        <input type="text" name="name" id="name" placeholder="Name"/>
                    </div>
                    <div class="fieldHalf">
                        <input type="text" name="email" id="email" placeholder="Email"/>
                    </div>
                    <div class="field">
                        <textarea name="message" id="message" rows="4" placeholder="Message"></textarea>
                    </div>
                </div>
                <ul class="actions">
                    <li><input type="submit" value="Send Message" class="primary" /></li>
                    <li><input type="reset" value="Reset" /></li>
                </ul>
            </form>
    
        </div>
        </section>
</body>
</html>
