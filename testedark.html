<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/fontawesome-free-6.2.1-web/fontawesome-free-6.2.1-web/css/all.min.css">
    <link rel="stylesheet" href="testedark.css">
    <style>


*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


    
/*-----------------⬇⬇--IMPLEMENTACAO DO MODO DARK--⬇⬇---------------*/


:root
{
--COLOR-BRANCO:white;
--COLOR-PRETO:black;
}
.dark:root{
--COLOR-BRANCO:rgb(217, 236, 13);
--COLOR-PRETO:rgb(22, 54, 234);
}


body{
    background-color: var(--COLOR-BRANCO);   
}


/*--------------⬆⬆--IMPLEMENTACAO DO MODO DARK--⬆⬆---------------*/



    </style>
</head>
<body>
    
    <!--------------⬇⬇--IMPLEMENTACAO DO MODO DARK--⬇⬇-------------->
    <div class="conteiner">
        <input type="checkbox" class="checkbox" id="chk" />
        <label class="label" for="chk">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
            <div class="ball"></div>    
        </label>
    </div>
    <!--------------⬆⬆--IMPLEMENTACAO DO MODO DARK--⬆⬆-------------->


    <script>

/*--------------⬇⬇--IMPLEMENTACAO DO MODO DARK--⬇⬇--------------*/
const chk = document.getElementById('chk')
const html = document.querySelector('html')

chk.addEventListener('change', () => {
  html.classList.toggle('dark')
  
})



/*--------------⬆⬆--IMPLEMENTACAO DO MODO DARK--⬆⬆--------------*/
    </script>
</body>
</html>
